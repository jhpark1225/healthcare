<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCR-002 환자 목록 — Mobile (React Native)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN-apple.md tokens ─────────────────────────────── */
    :root {
      --primary:          #0066cc;
      --primary-focus:    #0071e3;
      --ink:              #1d1d1f;
      --ink-muted-48:     #7a7a7a;
      --hairline:         #e0e0e0;
      --canvas:           #ffffff;
      --canvas-parchment: #f5f5f7;
      --on-primary:       #ffffff;

      --r-sm:   8px;
      --r-lg:   18px;
      --r-pill: 9999px;

      --sp-xs:   8px;
      --sp-sm:  12px;
      --sp-lg:  24px;
      --sp-xl:  32px;
      --sp-xxl: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e5e5ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 40px 16px;
    }

    /* 데모 래퍼 */
    .phone-wrapper { position: relative; }
    .demo-label {
      position: absolute;
      top: -28px;
      left: 0;
      font-size: 12px;
      color: #636366;
      letter-spacing: 0.3px;
      font-family: 'Inter', sans-serif;
    }

    /* 핸드폰 프레임 */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: var(--canvas-parchment);
      border-radius: 54px;
      box-shadow:
        0 0 0 10px #1d1d1f,
        0 0 0 12px #3a3a3c,
        0 32px 80px rgba(0,0,0,0.45);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .notch {
      width: 126px;
      height: 37px;
      background: #1d1d1f;
      border-radius: 0 0 20px 20px;
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* 화면 전체 */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--canvas-parchment);
    }

    /* ── 상단 고정 헤더 ──────────────────────────────────────
       tagline: 21px / 600 / ls 0.231px                          */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: var(--canvas-parchment);
      flex-shrink: 0;
    }

    .header h1 {
      font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.19;
      letter-spacing: 0.231px;
      color: var(--ink);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--r-pill);
      color: var(--primary);
    }

    /* ── 검색 + 필터 영역 ───────────────────────────────────── */
    .search-area {
      padding: 8px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
      background: var(--canvas-parchment);
      flex-shrink: 0;
    }

    /* search-input 스펙: pill, h44, rgba(0,0,0,0.08) 테두리, 17px body */
    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted-48);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: var(--r-pill);
      padding: 0 16px 0 40px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
      color: var(--ink);
      background: var(--canvas);
      outline: none;
      -webkit-appearance: none;
    }

    .search-input::placeholder { color: var(--ink-muted-48); }

    .search-input:focus {
      border-color: transparent;
      outline: 2px solid var(--primary-focus);
      outline-offset: 0;
    }

    /* 필터 칩 — configurator-option-chip: pill, canvas, 14px, 12px 16px */
    .chip-group {
      display: flex;
      gap: var(--sp-xs);
    }

    .chip {
      height: 36px;
      padding: 0 16px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      background: var(--canvas);
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s ease;
    }

    /* configurator-option-chip-selected: 2px solid primary-focus */
    .chip.active {
      border: 2px solid var(--primary-focus);
      color: var(--primary);
      font-weight: 600;
    }

    .chip:active { transform: scale(0.95); }

    /* 구분선 */
    .divider-line {
      height: 1px;
      background: var(--hairline);
      margin: 0 16px;
      flex-shrink: 0;
    }

    /* ── 환자 목록 (스크롤) ─────────────────────────────────── */
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .list::-webkit-scrollbar { display: none; }

    /* 빈 상태 */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-xxl) 0;
      gap: var(--sp-sm);
      color: var(--ink-muted-48);
    }

    .empty-state.show { display: flex; }

    .empty-state p {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
    }

    /* store-utility-card 스펙: canvas bg, 1px hairline, rounded.lg 18px, 24px padding */
    .patient-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .patient-card:active { transform: scale(0.98); }

    /* 아바타 — canvas-parchment bg, ink text */
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--r-pill);
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    /* body-strong: 17px / 600 / ls -0.374px */
    .patient-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.24;
      letter-spacing: -0.374px;
      color: var(--ink);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: var(--sp-xs);
    }

    /* 성별 배지 */
    .gender-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0;
      padding: 2px 7px;
      border-radius: var(--r-pill);
    }

    .gender-badge.male {
      background: rgba(0, 102, 204, 0.08);
      color: var(--primary);
    }

    .gender-badge.female {
      background: var(--canvas-parchment);
      color: var(--ink-muted-48);
    }

    /* caption: 14px / 400 / lh 1.43 / ls -0.224px */
    .patient-birth {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.43;
      letter-spacing: -0.224px;
      color: var(--ink-muted-48);
    }

    /* 우측 꺽쇠 */
    .chevron {
      color: var(--hairline);
      flex-shrink: 0;
    }

    /* 홈 인디케이터 */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--canvas-parchment);
    }

    .home-indicator span {
      width: 134px;
      height: 5px;
      background: var(--ink);
      border-radius: var(--r-pill);
      opacity: 0.2;
    }
  </style>
</head>
<body>

<div class="phone-wrapper">
  <span class="demo-label">SCR-002 · 환자 목록 — React Native (Mobile)</span>

  <div class="phone-frame">
    <div class="notch"></div>

    <div class="screen">

      <!-- 상단 헤더 -->
      <div class="header">
        <h1>환자 목록</h1>
        <button class="btn-icon" title="로그아웃" aria-label="로그아웃">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13 14l3-4-3-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 10H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- 검색 + 필터 -->
      <div class="search-area">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            class="search-input"
            type="text"
            id="searchInput"
            placeholder="환자 이름 검색"
            oninput="filterPatients()"
            aria-label="환자 이름 검색"
          />
        </div>

        <div class="chip-group" role="group" aria-label="성별 필터">
          <button class="chip active" onclick="setGender('all', this)">전체</button>
          <button class="chip" onclick="setGender('M', this)">남</button>
          <button class="chip" onclick="setGender('F', this)">여</button>
        </div>
      </div>

      <div class="divider-line"></div>

      <!-- 환자 목록 -->
      <div class="list" id="patientList">
        <!-- JS로 렌더 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="#e0e0e0" stroke-width="2"/>
          <path d="M14 20h12M20 14v12" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>검색 결과가 없습니다.</p>
      </div>

    </div>

    <div class="home-indicator"><span></span></div>
  </div>
</div>

<script>
  const patients = [
    { id:'user_001', name:'김민준', gender:'M', birth:'1985.03.15' },
    { id:'user_002', name:'이서연', gender:'F', birth:'1990.07.22' },
    { id:'user_003', name:'박지훈', gender:'M', birth:'1978.11.08' },
    { id:'user_004', name:'최수빈', gender:'F', birth:'1995.02.14' },
    { id:'user_005', name:'정하늘', gender:'F', birth:'1988.06.30' },
    { id:'user_006', name:'한지민', gender:'F', birth:'1992.09.17' },
    { id:'user_007', name:'김도윤', gender:'M', birth:'1975.12.03' },
    { id:'user_008', name:'이민지', gender:'F', birth:'1998.04.25' },
    { id:'user_009', name:'오성민', gender:'M', birth:'1982.08.11' },
    { id:'user_010', name:'서예진', gender:'F', birth:'1993.01.06' },
  ];

  let currentGender = 'all';
  let searchTimer = null;

  function setGender(gender, el) {
    currentGender = gender;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterPatients();
  }

  function filterPatients() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(render, 300); // debounce 300ms
  }

  function render() {
    const query = document.getElementById('searchInput').value.trim();
    const filtered = patients.filter(p => {
      const matchName   = !query || p.name.includes(query);
      const matchGender = currentGender === 'all' || p.gender === currentGender;
      return matchName && matchGender;
    });

    const list  = document.getElementById('patientList');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      return;
    }

    empty.classList.remove('show');
    list.innerHTML = filtered.map(p => `
      <div class="patient-card" role="button" tabindex="0" aria-label="${p.name} 상세 보기">
        <div class="avatar">${p.name[0]}</div>
        <div class="card-info">
          <div class="patient-name">
            ${p.name}
            <span class="gender-badge ${p.gender === 'M' ? 'male' : 'female'}">
              ${p.gender === 'M' ? '남' : '여'}
            </span>
          </div>
          <div class="patient-birth">${p.birth}</div>
        </div>
        <svg class="chevron" width="8" height="14" viewBox="0 0 8 14" fill="none">
          <path d="M1 1l6 6-6 6" stroke="#e0e0e0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `).join('');
  }

  render();
</script>

</body>
</html>
