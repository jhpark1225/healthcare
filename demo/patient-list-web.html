<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCR-002 환자 목록 — Web (React)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN-apple.md tokens ─────────────────────────────── */
    :root {
      --primary:            #0066cc;
      --primary-focus:      #0071e3;
      --ink:                #1d1d1f;
      --ink-muted-48:       #7a7a7a;
      --body-muted:         #cccccc;
      --hairline:           #e0e0e0;
      --canvas:             #ffffff;
      --canvas-parchment:   #f5f5f7;
      --surface-tile-1:     #272729;
      --on-dark:            #ffffff;
      --on-primary:         #ffffff;

      --r-sm:   8px;
      --r-lg:   18px;
      --r-pill: 9999px;

      --sp-xs:   8px;
      --sp-sm:  12px;
      --sp-md:  17px;
      --sp-lg:  24px;
      --sp-xl:  32px;
      --sp-xxl: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      font-family: 'SF Pro Text', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      background: var(--canvas-parchment);
      overflow: hidden;
    }

    /* ── 좌측 사이드바 ──────────────────────────────────────────
       product-tile-dark 스펙: bg surface-tile-1 (#272729)
       그라디언트·그림자 없음                                       */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface-tile-1);
      display: flex;
      flex-direction: column;
      padding: var(--sp-xl) 0;
      transition: transform 0.25s ease;
    }

    /* 로고 영역 */
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: 0 var(--sp-lg) var(--sp-xl);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    /* tagline: 21px / 600 / ls 0.231px */
    .logo-text {
      font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
      color: var(--on-dark);
      line-height: 1.2;
    }

    /* 구분선 */
    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 var(--sp-lg) var(--sp-lg);
    }

    /* nav-link: 12px / 400 / ls -0.12px → 메뉴는 14px/400 사용 */
    .nav-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 0 var(--sp-lg) var(--sp-xs);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: 10px var(--sp-lg);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s ease, color 0.15s ease;
      margin: 1px 8px;
      border-radius: var(--r-sm);
    }

    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--on-dark); }

    .nav-item.active {
      background: rgba(255,255,255,0.1);
      color: var(--on-dark);
      font-weight: 600;
    }

    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    /* 하단 로그아웃 */
    .sidebar-footer {
      margin-top: auto;
      padding: var(--sp-lg) var(--sp-lg) 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* button-dark-utility: bg ink, text on-dark, 14px/400, rounded.sm, 8px 15px */
    .btn-logout {
      display: flex;
      align-items: center;
      gap: var(--sp-xs);
      width: 100%;
      padding: 10px var(--sp-sm);
      background: transparent;
      border: none;
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn-logout:hover { background: rgba(255,255,255,0.06); color: var(--on-dark); }
    .btn-logout:active { transform: scale(0.95); }

    /* ── 메인 영역 ──────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--canvas-parchment);
    }

    /* 상단 툴바 */
    .toolbar {
      padding: var(--sp-xl) var(--sp-xl) var(--sp-lg);
      background: var(--canvas-parchment);
      flex-shrink: 0;
    }

    /* display-md: 34px / 600 / ls -0.374px */
    .toolbar h1 {
      font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.14;
      letter-spacing: -0.374px;
      color: var(--ink);
      margin-bottom: var(--sp-lg);
    }

    .toolbar-controls {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      flex-wrap: wrap;
    }

    /* search-input 스펙: pill, h44, rgba(0,0,0,0.08) 테두리, 17px body */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 360px;
      min-width: 200px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted-48);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: var(--r-pill);
      padding: 0 16px 0 40px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
      color: var(--ink);
      background: var(--canvas);
      outline: none;
      -webkit-appearance: none;
    }

    .search-input::placeholder { color: var(--ink-muted-48); }

    .search-input:focus {
      border-color: transparent;
      outline: 2px solid var(--primary-focus);
      outline-offset: 0;
    }

    /* 필터 칩 — configurator-option-chip */
    .chip-group { display: flex; gap: var(--sp-xs); }

    .chip {
      height: 44px;
      padding: 0 18px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      background: var(--canvas);
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s ease;
    }

    /* configurator-option-chip-selected: 2px solid primary-focus */
    .chip.active {
      border: 2px solid var(--primary-focus);
      color: var(--primary);
      font-weight: 600;
    }

    .chip:active { transform: scale(0.95); }

    /* 결과 카운트 — caption */
    .result-count {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: var(--ink-muted-48);
      padding: 0 var(--sp-xl) var(--sp-sm);
      flex-shrink: 0;
    }

    /* ── 카드 그리드 ─────────────────────────────────────────── */
    .grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--sp-xl) var(--sp-xl);
    }

    .grid-wrap::-webkit-scrollbar { width: 4px; }
    .grid-wrap::-webkit-scrollbar-track { background: transparent; }
    .grid-wrap::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 2px; }

    /* store-utility-card 스펙: canvas, 1px hairline, rounded.lg 18px, 24px padding */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-lg);
    }

    .patient-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      padding: var(--sp-lg);
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      cursor: pointer;
      transition: transform 0.1s ease, border-color 0.15s ease;
    }

    .patient-card:hover { border-color: var(--primary-focus); }
    .patient-card:active { transform: scale(0.98); }

    /* 아바타 */
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: var(--r-pill);
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
    }

    .card-info { flex: 1; min-width: 0; }

    /* body-strong: 17px / 600 / ls -0.374px */
    .patient-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.24;
      letter-spacing: -0.374px;
      color: var(--ink);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: var(--sp-xs);
      flex-wrap: wrap;
    }

    .gender-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: var(--r-pill);
    }

    .gender-badge.male   { background: rgba(0,102,204,0.08); color: var(--primary); }
    .gender-badge.female { background: var(--canvas-parchment); color: var(--ink-muted-48); }

    /* caption: 14px / 400 / ls -0.224px */
    .patient-birth {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.224px;
      color: var(--ink-muted-48);
    }

    /* 빈 상태 */
    .empty-state {
      display: none;
      grid-column: 1 / -1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-xxl);
      gap: var(--sp-sm);
      color: var(--ink-muted-48);
    }

    .empty-state.show { display: flex; }

    .empty-state p {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.374px;
    }

    /* ── 모바일 상단 탭바 (≤ 768px) ──────────────────────────── */
    .mobile-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface-tile-1);
      flex-shrink: 0;
    }

    .mobile-topbar .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--on-dark);
    }

    .mobile-topbar .btn-icon {
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ── 반응형 ──────────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      body { overflow: auto; height: auto; }
      .sidebar { display: none; }
      .mobile-topbar { display: flex; }
      .main { overflow: visible; }
      .toolbar { padding: var(--sp-lg) 16px var(--sp-sm); }
      .toolbar h1 { font-size: 21px; margin-bottom: var(--sp-sm); }
      .toolbar-controls { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
      .grid-wrap { padding: 0 16px var(--sp-xl); overflow: visible; }
      .grid { grid-template-columns: 1fr; gap: var(--sp-xs); }
      .result-count { padding: 0 16px var(--sp-xs); }
    }
  </style>
</head>
<body>

  <!-- 좌측 사이드바 (데스크톱) -->
  <aside class="sidebar" aria-label="사이드바 내비게이션">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
        <rect x="13.5" y="3"  width="9" height="30" rx="4.5" fill="#ffffff"/>
        <rect x="3"   y="13.5" width="30" height="9" rx="4.5" fill="#ffffff"/>
      </svg>
      <span class="logo-text">건강 관리<br/>플랫폼</span>
    </div>

    <div class="sidebar-divider"></div>

    <p class="nav-label">메뉴</p>

    <nav>
      <a class="nav-item active" href="#" aria-current="page">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="10" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/>
          <path d="M1 14c0-3 2.2-5 5-5h4c2.8 0 5 2 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        환자 목록
      </a>
      <a class="nav-item" href="#">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/>
        </svg>
        설정
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" aria-label="로그아웃">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M10 11l4-3-4-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 8H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        로그아웃
      </button>
    </div>
  </aside>

  <!-- 메인 영역 -->
  <main class="main">

    <!-- 모바일 탑바 -->
    <div class="mobile-topbar">
      <span class="logo-text">건강 관리 플랫폼</span>
      <button class="btn-icon" aria-label="로그아웃">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M6 2H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M11 13l4-4-4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 9H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <h1>환자 목록</h1>
      <div class="toolbar-controls">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            class="search-input"
            type="text"
            id="searchInput"
            placeholder="환자 이름 검색"
            oninput="filterPatients()"
            aria-label="환자 이름 검색"
          />
        </div>
        <div class="chip-group" role="group" aria-label="성별 필터">
          <button class="chip active" onclick="setGender('all', this)">전체</button>
          <button class="chip" onclick="setGender('M', this)">남</button>
          <button class="chip" onclick="setGender('F', this)">여</button>
        </div>
      </div>
    </div>

    <!-- 결과 카운트 -->
    <p class="result-count" id="resultCount"></p>

    <!-- 카드 그리드 -->
    <div class="grid-wrap">
      <div class="grid" id="patientGrid">
        <!-- JS 렌더 -->
      </div>
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#e0e0e0" stroke-width="2"/>
          <path d="M16 24h16M24 16v16" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>검색 결과가 없습니다.</p>
      </div>
    </div>

  </main>

  <script>
    const patients = [
      { id:'user_001', name:'김민준', gender:'M', birth:'1985.03.15' },
      { id:'user_002', name:'이서연', gender:'F', birth:'1990.07.22' },
      { id:'user_003', name:'박지훈', gender:'M', birth:'1978.11.08' },
      { id:'user_004', name:'최수빈', gender:'F', birth:'1995.02.14' },
      { id:'user_005', name:'정하늘', gender:'F', birth:'1988.06.30' },
      { id:'user_006', name:'한지민', gender:'F', birth:'1992.09.17' },
      { id:'user_007', name:'김도윤', gender:'M', birth:'1975.12.03' },
      { id:'user_008', name:'이민지', gender:'F', birth:'1998.04.25' },
      { id:'user_009', name:'오성민', gender:'M', birth:'1982.08.11' },
      { id:'user_010', name:'서예진', gender:'F', birth:'1993.01.06' },
    ];

    let currentGender = 'all';
    let searchTimer = null;

    function setGender(gender, el) {
      currentGender = gender;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filterPatients();
    }

    function filterPatients() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(render, 300); // debounce 300ms
    }

    function render() {
      const query = document.getElementById('searchInput').value.trim();
      const filtered = patients.filter(p => {
        const matchName   = !query || p.name.includes(query);
        const matchGender = currentGender === 'all' || p.gender === currentGender;
        return matchName && matchGender;
      });

      const grid  = document.getElementById('patientGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('resultCount');

      count.textContent = `전체 ${filtered.length}명`;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.add('show');
        return;
      }

      empty.classList.remove('show');
      grid.innerHTML = filtered.map(p => `
        <div class="patient-card" role="button" tabindex="0" aria-label="${p.name} 상세 보기">
          <div class="avatar">${p.name[0]}</div>
          <div class="card-info">
            <div class="patient-name">
              ${p.name}
              <span class="gender-badge ${p.gender === 'M' ? 'male' : 'female'}">
                ${p.gender === 'M' ? '남' : '여'}
              </span>
            </div>
            <div class="patient-birth">${p.birth}</div>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>

</body>
</html>
