name: Deploy Backend

# ────────────────────────────────────────────────────────────────
# health-backend/ 또는 이 워크플로 파일 변경 시 main 브랜치에 push하면 실행
# ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'health-backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ── 네임스페이스: BACKEND_PORT 기반 고유 이름 ───────────────
    env:
      IMAGE_NAME:     healthcare-backend-${{ vars.BACKEND_PORT }}
      CONTAINER_NAME: healthcare-backend-${{ vars.BACKEND_PORT }}
      DEPLOY_DIR:     /app/healthcare-${{ vars.BACKEND_PORT }}/backend

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # 2. Docker 이미지 빌드 (health-backend/ 컨텍스트)
      - name: Docker 이미지 빌드
        working-directory: health-backend
        run: docker build -t "$IMAGE_NAME" .

      # 3. 이미지를 tar.gz로 압축 저장
      - name: 이미지 압축
        run: docker save "$IMAGE_NAME" | gzip > backend.tar.gz

      # 4. SSH 접속 준비 (비공개 키 + known_hosts)
      - name: SSH 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # SERVER_HOST = user@hostname 형태 — ssh-keyscan은 hostname만 필요
          _HOST="${{ vars.SERVER_HOST }}"
          ssh-keyscan -p ${{ vars.SERVER_PORT }} "${_HOST#*@}" \
            >> ~/.ssh/known_hosts 2>/dev/null || true

      # 5. 서버에 배포 디렉토리 생성
      - name: 배포 디렉토리 생성
        run: |
          ssh -p ${{ vars.SERVER_PORT }} \
            ${{ vars.SERVER_HOST }} \
            "mkdir -p $DEPLOY_DIR"

      # 6. 이미지 파일 전송 (SCP)
      - name: 이미지 전송
        run: |
          scp -P ${{ vars.SERVER_PORT }} backend.tar.gz \
            ${{ vars.SERVER_HOST }}:$DEPLOY_DIR/backend.tar.gz

      # 7. 배포 스크립트 생성 → 서버 전송 → 실행
      #
      #    * heredoc 미인용(SCRIPT) → 러너의 환경변수($VAR)가 스크립트 파일에 직접 치환됨
      #    * 생성된 .sh 파일에는 모든 값이 리터럴로 포함됨 (서버에서 변수 치환 불필요)
      #    * JWT_ACCESS_TTL / JWT_REFRESH_TTL: 초(second) 숫자값에 's' 접미사 추가
      #      → ms 라이브러리 포맷 변환 (예: 86400 → "86400s")
      #    * 비밀번호 등 secret에 특수문자($, \, `, ")가 포함되면 치환 오류 발생할 수 있음
      - name: 배포 스크립트 생성 및 실행
        env:
          APP_PORT:            ${{ vars.BACKEND_PORT }}
          DB_HOST:             ${{ vars.DB_HOST }}
          DB_PORT:             ${{ vars.DB_PORT }}
          DB_NAME:             ${{ vars.DB_NAME }}
          DB_USER:             ${{ secrets.DB_USER }}
          DB_PASSWORD:         ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:          ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET:  ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_TTL:      ${{ vars.JWT_ACCESS_TTL_SEC }}
          JWT_REFRESH_TTL:     ${{ vars.JWT_REFRESH_TTL_SEC }}
          SIMULATOR_URL:       ${{ vars.SIMULATOR_URL }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # ── 스크립트 파일 생성 (변수 값을 러너에서 직접 치환) ──
          cat > /tmp/deploy_${APP_PORT}.sh << SCRIPT
          #!/bin/bash
          set -e

          echo '>>> [1/4] Docker 이미지 로드'
          docker load < ${DEPLOY_DIR}/backend.tar.gz

          echo '>>> [2/4] 기존 컨테이너 중지 및 제거'
          docker stop ${CONTAINER_NAME} 2>/dev/null || true
          docker rm   ${CONTAINER_NAME} 2>/dev/null || true

          echo '>>> [3/4] 컨테이너 기동'
          mkdir -p /app/healthcare-${APP_PORT}/logs
          docker run -d \
            --name ${CONTAINER_NAME} \
            --restart unless-stopped \
            -p ${APP_PORT}:${APP_PORT} \
            -v /app/healthcare-${APP_PORT}/logs:/app/logs \
            -e PORT=${APP_PORT} \
            -e NODE_ENV=production \
            -e DB_HOST=${DB_HOST} \
            -e DB_PORT=${DB_PORT} \
            -e DB_NAME=${DB_NAME} \
            -e DB_USER=${DB_USER} \
            -e DB_PASSWORD=${DB_PASSWORD} \
            -e JWT_SECRET=${JWT_SECRET} \
            -e JWT_EXPIRES_IN=${JWT_ACCESS_TTL}s \
            -e JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET} \
            -e JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_TTL}s \
            -e SIMULATOR_URL=${SIMULATOR_URL} \
            -e AI_API_URL=http://localhost:8000 \
            -e AI_API_TIMEOUT_MS=30000 \
            -e SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL} \
            -e LOG_DIR=/app/logs \
            -e LOG_LEVEL=info \
            -e LOG_RETENTION_DAYS=7d \
            -e DATA_RETENTION_DAYS=7 \
            ${IMAGE_NAME}

          echo '>>> [4/4] 오래된 이미지 정리'
          docker image prune -f

          echo '=== 배포 완료 ==='
          docker ps --filter "name=${CONTAINER_NAME}" \
            --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          SCRIPT

          chmod +x /tmp/deploy_${APP_PORT}.sh

          # ── 스크립트 서버 전송 ──
          scp -P ${{ vars.SERVER_PORT }} /tmp/deploy_${APP_PORT}.sh \
            ${{ vars.SERVER_HOST }}:/tmp/deploy_${APP_PORT}.sh

          # ── 서버에서 실행 후 스크립트 삭제 ──
          ssh -p ${{ vars.SERVER_PORT }} \
            ${{ vars.SERVER_HOST }} \
            "chmod +x /tmp/deploy_${APP_PORT}.sh \
             && /tmp/deploy_${APP_PORT}.sh \
             && rm -f /tmp/deploy_${APP_PORT}.sh"
